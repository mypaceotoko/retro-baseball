<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>RETRO BASEBALL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:  #f5d800;
      --lime:    #4caf50;
      --cream:   #f5e6c8;
      --red:     #cc2200;
      --white:   #ffffff;
      --black:   #111111;
      --blue:    #2266cc;
      --orange:  #e07800;
      --pixel:   "Press Start 2P", monospace;
    }

    body {
      background: #0a0a0a;
      color: var(--cream);
      font-family: var(--pixel);
      font-size: 10px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ===== TITLE ===== */
    #title-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 20px;
    }
    #title-screen .logo-sub {
      font-size: clamp(9px, 2vw, 12px);
      color: #888;
      letter-spacing: 3px;
    }
    #title-screen h1 {
      font-size: clamp(22px, 7vw, 48px);
      color: var(--yellow);
      text-shadow: 5px 5px 0 var(--red), 10px 10px 0 #000;
      letter-spacing: 4px;
      text-align: center;
      line-height: 1.3;
      animation: titlePulse 2s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 5px 5px 0 var(--red), 10px 10px 0 #000; }
      50%       { text-shadow: 5px 5px 0 var(--red), 10px 10px 0 #000, 0 0 30px var(--yellow); }
    }
    #title-screen .subtitle {
      color: var(--lime);
      font-size: clamp(8px, 2vw, 11px);
      text-align: center;
      line-height: 2.2;
    }

    /* ===== モード選択 ===== */
    .mode-select-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }
    .mode-select-label {
      color: var(--yellow);
      font-size: clamp(9px, 2.2vw, 12px);
      letter-spacing: 2px;
      text-align: center;
    }
    .mode-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ===== ボタン ===== */
    .pixel-btn {
      background: var(--yellow);
      color: var(--black);
      border: none;
      padding: 14px 28px;
      font-family: var(--pixel);
      font-size: clamp(9px, 2.2vw, 12px);
      cursor: pointer;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.08s, box-shadow 0.08s;
      letter-spacing: 1px;
      line-height: 1.6;
      text-align: center;
    }
    .pixel-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 #000;
    }
    .pixel-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .pixel-btn.green  { background: var(--lime); color: #000; }
    .pixel-btn.blue   { background: var(--blue); color: #fff; }
    .pixel-btn.orange { background: var(--orange); color: #fff; }
    .pixel-btn.big    { font-size: clamp(12px, 3.5vw, 18px); padding: 18px 40px; }
    .pixel-btn.action { font-size: clamp(13px, 4vw, 20px); padding: 20px 50px; }

    /* ===== GAME SCREEN ===== */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 680px;
      padding: 6px 8px;
      gap: 6px;
    }

    /* ===== SCOREBOARD ===== */
    #scoreboard {
      width: 100%;
      background: #111;
      border: 3px solid var(--yellow);
      box-shadow: 0 0 16px rgba(245,216,0,0.4);
      padding: 8px;
    }
    .sb-title {
      text-align: center;
      color: var(--yellow);
      font-size: 9px;
      margin-bottom: 6px;
      letter-spacing: 3px;
    }
    .sb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(6px, 1.6vw, 9px);
    }
    .sb-table th, .sb-table td {
      border: 1px solid #333;
      text-align: center;
      padding: 4px 2px;
      min-width: 18px;
    }
    .sb-table th { color: var(--yellow); background: #1a1a1a; }
    .sb-table .team-name {
      text-align: left; padding-left: 6px; color: var(--lime);
      max-width: 90px; overflow: hidden; white-space: nowrap;
    }
    .sb-table .score-total { color: var(--yellow); font-size: 12px; }
    .sb-table .active-inning { background: #2a2a00; color: var(--yellow); }

    /* ===== STATUS BAR ===== */
    #status-bar {
      width: 100%;
      background: #111;
      border: 2px solid #333;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .status-label { color: #888; font-size: 7px; letter-spacing: 1px; }
    .status-value { color: var(--cream); font-size: 12px; }
    .status-value.big { font-size: 16px; color: var(--yellow); }

    /* ===== FIELD CANVAS ===== */
    #field-wrap {
      width: 100%;
      position: relative;
      background: #0d1f0d;
      border: 3px solid #2a4a2a;
      box-shadow: 0 0 20px rgba(0,100,0,0.3);
      cursor: pointer;
    }
    #field-canvas {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: pixelated;
    }

    /* ===== BATTER INFO ===== */
    #batter-info {
      width: 100%;
      background: #111;
      border: 2px solid #333;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .batter-label { color: #888; font-size: 7px; letter-spacing: 1px; margin-bottom: 2px; }
    .batter-name  { color: var(--white); font-size: clamp(9px, 2.5vw, 13px); }
    .batter-stats { color: #aaa; font-size: 8px; }

    /* ===== COMMENTARY ===== */
    #commentary {
      width: 100%;
      background: #0a1a0a;
      border: 2px solid var(--lime);
      box-shadow: 0 0 10px rgba(76,175,80,0.2);
      padding: 12px 16px;
      min-height: 56px;
      display: flex;
      align-items: center;
    }
    #commentary-text {
      color: var(--lime);
      font-size: clamp(10px, 2.8vw, 13px);
      line-height: 1.9;
      white-space: pre-wrap;
    }

    /* ===== OUTS ===== */
    .outs-dots { display: flex; gap: 8px; }
    .out-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--red);
      background: transparent;
    }
    .out-dot.filled { background: var(--red); }

    /* ===== COUNT ===== */
    .count-row { display: flex; gap: 5px; align-items: center; }
    .count-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 2px solid #555;
    }
    .count-dot.ball   { border-color: var(--lime); }
    .count-dot.ball.on   { background: var(--lime); }
    .count-dot.strike { border-color: var(--yellow); }
    .count-dot.strike.on { background: var(--yellow); }

    /* ===== PITCHER CONTROL PANEL ===== */
    #pitcher-panel {
      display: none; /* ピッチャーモード時のみ表示 */
      width: 100%;
      background: #0a0a1a;
      border: 2px solid var(--blue);
      box-shadow: 0 0 12px rgba(34,102,204,0.3);
      padding: 10px 12px;
      gap: 8px;
      flex-direction: column;
    }
    .panel-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .panel-label {
      color: #88aaff;
      font-size: clamp(7px, 1.8vw, 9px);
      letter-spacing: 1px;
      min-width: 48px;
      flex-shrink: 0;
    }
    .select-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* コース・球速選択ボタン */
    .sel-btn {
      background: #1a1a2a;
      color: #aaa;
      border: 2px solid #444;
      padding: 7px 12px;
      font-family: var(--pixel);
      font-size: clamp(7px, 1.8vw, 9px);
      cursor: pointer;
      box-shadow: 2px 2px 0 #000;
      transition: all 0.1s;
      letter-spacing: 1px;
      line-height: 1.5;
      text-align: center;
    }
    .sel-btn:hover {
      border-color: #888;
      color: #fff;
    }
    .sel-btn:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 #000;
    }
    /* 選択中 */
    .sel-btn.selected-course {
      background: #1a3a6a;
      border-color: #4488ff;
      color: #88ccff;
      box-shadow: 0 0 8px rgba(68,136,255,0.5), 2px 2px 0 #000;
    }
    .sel-btn.selected-speed {
      background: #3a1a00;
      border-color: #ff8800;
      color: #ffcc66;
      box-shadow: 0 0 8px rgba(255,136,0,0.5), 2px 2px 0 #000;
    }
    /* コースインジケーター（ストライクゾーン可視化） */
    #course-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .zone-box {
      width: 22px;
      height: 28px;
      border: 1.5px solid #333;
      background: #111;
      position: relative;
      transition: all 0.15s;
    }
    .zone-box.zone-active {
      background: rgba(68,136,255,0.25);
      border-color: #4488ff;
      box-shadow: 0 0 6px rgba(68,136,255,0.4);
    }
    .zone-ball-dot {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .zone-active .zone-ball-dot {
      opacity: 1;
      background: #88ccff;
      box-shadow: 0 0 4px #4488ff;
    }
    /* 球速メーター */
    #speed-meter {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .speed-bar {
      height: 8px;
      border-radius: 2px;
      background: #333;
      transition: all 0.2s;
    }
    .speed-bar.s1 { width: 20px; }
    .speed-bar.s2 { width: 36px; }
    .speed-bar.s3 { width: 52px; }
    .speed-bar.active-slow   { background: #44cc88; box-shadow: 0 0 4px #44cc88; }
    .speed-bar.active-normal { background: #ffcc00; box-shadow: 0 0 4px #ffcc00; }
    .speed-bar.active-fast   { background: #ff4444; box-shadow: 0 0 4px #ff4444; }
    #speed-value {
      color: #ffcc66;
      font-size: clamp(7px, 1.8vw, 9px);
      min-width: 50px;
    }

    /* ===== MODE LABEL ===== */
    #mode-label {
      width: 100%;
      text-align: center;
      font-size: clamp(8px, 2vw, 10px);
      color: #aaa;
      padding: 4px 0;
      letter-spacing: 1px;
    }

    /* ===== ACTION AREA ===== */
    #action-area {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 10px 0 6px;
      gap: 16px;
    }

    /* ===== RESULT ===== */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 22px;
      padding: 20px;
      text-align: center;
    }
    #result-screen .game-over-label {
      color: #888; font-size: 10px; letter-spacing: 3px;
    }
    #result-screen h2 {
      font-size: clamp(16px, 5vw, 28px);
      color: var(--yellow);
      text-shadow: 4px 4px 0 var(--red), 8px 8px 0 #000;
    }
    #result-detail {
      color: var(--cream);
      font-size: clamp(9px, 2.5vw, 12px);
      line-height: 2.4;
      background: #111;
      border: 2px solid #333;
      padding: 16px 24px;
    }
    .result-mode-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ===== SCANLINE ===== */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 420px) {
      .sb-table { font-size: 6px; }
      .sb-table th, .sb-table td { padding: 3px 1px; min-width: 14px; }
      .sb-table .team-name { max-width: 60px; }
      .mode-btns { flex-direction: column; align-items: center; }
      .panel-row { gap: 6px; }
      .sel-btn { padding: 6px 9px; }
    }
  </style>
</head>
<body>

<!-- ========== TITLE SCREEN ========== -->
<div id="title-screen">
  <div class="logo-sub">⚾ PIXEL STADIUM ⚾</div>
  <h1>RETRO<br>BASEBALL</h1>
  <div class="subtitle">
    伝説の選手たちが集結！<br>
    9回制・完全アニメーション
  </div>

  <div class="mode-select-area">
    <div class="mode-select-label">▼ モードを選んでください ▼</div>
    <div class="mode-btns">
      <button class="pixel-btn blue big" id="start-pitcher-btn">
        ⚾ ピッチャーで<br>プレイ
      </button>
      <button class="pixel-btn orange big" id="start-batter-btn">
        🏏 バッターで<br>プレイ
      </button>
    </div>
    <div style="color:#555; font-size:8px; margin-top:4px; text-align:center; line-height:2;">
      ピッチャー：コース＆球速を選んで投球！<br>
      バッター：CPUが投球、タイミングでスイング
    </div>
  </div>
</div>

<!-- ========== GAME SCREEN ========== -->
<div id="game-screen">

  <!-- SCOREBOARD -->
  <div id="scoreboard">
    <div class="sb-title">★ SCORE BOARD ★</div>
    <table class="sb-table" id="score-table">
      <thead>
        <tr>
          <th class="team-name">TEAM</th>
          <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
          <th>6</th><th>7</th><th>8</th><th>9</th>
          <th class="score-total">R</th>
        </tr>
      </thead>
      <tbody id="score-body"></tbody>
    </table>
  </div>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <div class="status-item">
      <span class="status-label">INNING</span>
      <span class="status-value big" id="inning-display">1回表</span>
    </div>
    <div class="status-item">
      <span class="status-label">OUT</span>
      <div class="outs-dots">
        <div class="out-dot" id="out0"></div>
        <div class="out-dot" id="out1"></div>
      </div>
    </div>
    <div class="status-item">
      <span class="status-label">BALL</span>
      <div class="count-row">
        <div class="count-dot ball" id="b0"></div>
        <div class="count-dot ball" id="b1"></div>
        <div class="count-dot ball" id="b2"></div>
      </div>
    </div>
    <div class="status-item">
      <span class="status-label">STRIKE</span>
      <div class="count-row">
        <div class="count-dot strike" id="s0"></div>
        <div class="count-dot strike" id="s1"></div>
      </div>
    </div>
  </div>

  <!-- FIELD CANVAS -->
  <div id="field-wrap">
    <canvas id="field-canvas" width="560" height="380"></canvas>
  </div>

  <!-- BATTER INFO -->
  <div id="batter-info">
    <div>
      <div class="batter-label">NOW BATTING</div>
      <div class="batter-name" id="batter-name-display">---</div>
    </div>
    <div>
      <div class="batter-label">PITCHER</div>
      <div class="batter-name" id="pitcher-name-display">---</div>
    </div>
    <div>
      <div class="batter-stats" id="batter-stats-display"></div>
    </div>
  </div>

  <!-- COMMENTARY -->
  <div id="commentary">
    <div id="commentary-text">⚾ プレイボール！</div>
  </div>

  <!-- ===== PITCHER CONTROL PANEL (ピッチャーモード専用) ===== -->
  <div id="pitcher-panel">

    <!-- コース選択行 -->
    <div class="panel-row">
      <span class="panel-label">コース</span>
      <div class="select-btns" id="course-btns">
        <button class="sel-btn" data-course="inner">⬅ 内角</button>
        <button class="sel-btn" data-course="center">真ん中</button>
        <button class="sel-btn" data-course="outer">外角 ➡</button>
      </div>
      <!-- ゾーン可視化 -->
      <div id="course-indicator">
        <div class="zone-box" id="zone-inner"><div class="zone-ball-dot"></div></div>
        <div class="zone-box" id="zone-center"><div class="zone-ball-dot"></div></div>
        <div class="zone-box" id="zone-outer"><div class="zone-ball-dot"></div></div>
      </div>
    </div>

    <!-- 球速選択行 -->
    <div class="panel-row">
      <span class="panel-label">球速</span>
      <div class="select-btns" id="speed-btns">
        <button class="sel-btn" data-speed="slow">🐢 遅い</button>
        <button class="sel-btn" data-speed="normal">⚾ 普通</button>
        <button class="sel-btn" data-speed="fast">🔥 速い</button>
      </div>
      <!-- 球速メーター -->
      <div id="speed-meter">
        <div class="speed-bar s1" id="speed-bar1"></div>
        <div class="speed-bar s2" id="speed-bar2"></div>
        <div class="speed-bar s3" id="speed-bar3"></div>
        <span id="speed-value">---</span>
      </div>
    </div>

  </div>

  <!-- MODE LABEL -->
  <div id="mode-label"></div>

  <!-- ACTION BUTTONS -->
  <div id="action-area">
    <!-- ピッチャーモード用 -->
    <button class="pixel-btn blue action" id="pitch-btn">⚾ PITCH !</button>
    <!-- バッターモード用（初期非表示） -->
    <button class="pixel-btn orange action" id="swing-btn" style="display:none;">🏏 SWING !</button>
  </div>

</div>

<!-- ========== RESULT SCREEN ========== -->
<div id="result-screen">
  <div class="game-over-label">GAME OVER</div>
  <h2 id="result-title">試合終了！</h2>
  <div id="result-detail"></div>
  <div class="result-mode-btns">
    <button class="pixel-btn blue" id="retry-btn">▶ もう一度</button>
    <button class="pixel-btn" id="back-title-btn">⬅ タイトルへ</button>
  </div>
</div>

<script src="game.js"></script>
<script>
  // タイトルに戻るボタン
  document.getElementById("back-title-btn").addEventListener("click", () => {
    document.getElementById("result-screen").style.display = "none";
    document.getElementById("title-screen").style.display  = "flex";
  });
</script>
</body>
</html>
