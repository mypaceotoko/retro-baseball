<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>RETRO BASEBALL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:  #f5d800;
      --lime:    #4caf50;
      --cream:   #f5e6c8;
      --red:     #cc2200;
      --white:   #ffffff;
      --black:   #111111;
      --pixel:   "Press Start 2P", monospace;
    }

    body {
      background: #0a0a0a;
      color: var(--cream);
      font-family: var(--pixel);
      font-size: 10px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ===== TITLE ===== */
    #title-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 20px;
    }
    #title-screen .logo-sub {
      font-size: clamp(9px, 2vw, 12px);
      color: #888;
      letter-spacing: 3px;
    }
    #title-screen h1 {
      font-size: clamp(22px, 7vw, 48px);
      color: var(--yellow);
      text-shadow: 5px 5px 0 var(--red), 10px 10px 0 #000;
      letter-spacing: 4px;
      text-align: center;
      line-height: 1.3;
      animation: titlePulse 2s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 5px 5px 0 var(--red), 10px 10px 0 #000; }
      50%       { text-shadow: 5px 5px 0 var(--red), 10px 10px 0 #000, 0 0 30px var(--yellow); }
    }
    #title-screen .subtitle {
      color: var(--lime);
      font-size: clamp(8px, 2vw, 11px);
      text-align: center;
      line-height: 2.2;
    }
    .pixel-btn {
      background: var(--yellow);
      color: var(--black);
      border: none;
      padding: 14px 32px;
      font-family: var(--pixel);
      font-size: clamp(10px, 2.5vw, 14px);
      cursor: pointer;
      box-shadow: 4px 4px 0 #000;
      transition: transform 0.08s, box-shadow 0.08s;
      letter-spacing: 1px;
    }
    .pixel-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 #000;
    }
    .pixel-btn.green { background: var(--lime); color: #000; font-size: clamp(12px, 3.5vw, 18px); padding: 18px 48px; }

    /* ===== GAME SCREEN ===== */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 680px;
      padding: 6px 8px;
      gap: 6px;
    }

    /* ===== SCOREBOARD ===== */
    #scoreboard {
      width: 100%;
      background: #111;
      border: 3px solid var(--yellow);
      box-shadow: 0 0 16px rgba(245,216,0,0.4);
      padding: 8px;
    }
    .sb-title {
      text-align: center;
      color: var(--yellow);
      font-size: 9px;
      margin-bottom: 6px;
      letter-spacing: 3px;
    }
    .sb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(6px, 1.6vw, 9px);
    }
    .sb-table th, .sb-table td {
      border: 1px solid #333;
      text-align: center;
      padding: 4px 2px;
      min-width: 18px;
    }
    .sb-table th { color: var(--yellow); background: #1a1a1a; }
    .sb-table .team-name {
      text-align: left; padding-left: 6px; color: var(--lime);
      max-width: 90px; overflow: hidden; white-space: nowrap;
    }
    .sb-table .score-total { color: var(--yellow); font-size: 12px; }
    .sb-table .active-inning { background: #2a2a00; color: var(--yellow); }

    /* ===== STATUS BAR ===== */
    #status-bar {
      width: 100%;
      background: #111;
      border: 2px solid #333;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .status-label { color: #888; font-size: 7px; letter-spacing: 1px; }
    .status-value { color: var(--cream); font-size: 12px; }
    .status-value.big { font-size: 16px; color: var(--yellow); }

    /* ===== FIELD CANVAS ===== */
    #field-wrap {
      width: 100%;
      position: relative;
      background: #0d1f0d;
      border: 3px solid #2a4a2a;
      box-shadow: 0 0 20px rgba(0,100,0,0.3);
      cursor: pointer;
    }
    #field-canvas {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: pixelated;
    }
    /* タップ促進テキスト */
    #field-wrap::after {
      content: "TAP TO PITCH";
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-family: var(--pixel);
      font-size: 7px;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
    }

    /* ===== BATTER INFO ===== */
    #batter-info {
      width: 100%;
      background: #111;
      border: 2px solid #333;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .batter-label { color: #888; font-size: 7px; letter-spacing: 1px; margin-bottom: 2px; }
    .batter-name  { color: var(--white); font-size: clamp(9px, 2.5vw, 13px); }
    .batter-stats { color: #aaa; font-size: 8px; }

    /* ===== COMMENTARY ===== */
    #commentary {
      width: 100%;
      background: #0a1a0a;
      border: 2px solid var(--lime);
      box-shadow: 0 0 10px rgba(76,175,80,0.2);
      padding: 12px 16px;
      min-height: 56px;
      display: flex;
      align-items: center;
    }
    #commentary-text {
      color: var(--lime);
      font-size: clamp(10px, 2.8vw, 13px);
      line-height: 1.9;
      white-space: pre-wrap;
    }

    /* ===== PITCH BUTTON ===== */
    #action-area {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 10px 0 6px;
    }

    /* ===== OUTS ===== */
    .outs-dots { display: flex; gap: 8px; }
    .out-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--yellow);
      background: transparent;
    }
    .out-dot.filled { background: var(--yellow); }

    /* ===== COUNT ===== */
    .count-row { display: flex; gap: 5px; align-items: center; }
    .count-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 2px solid #555;
    }
    .count-dot.ball   { border-color: var(--lime); }
    .count-dot.ball.on   { background: var(--lime); }
    .count-dot.strike { border-color: var(--red); }
    .count-dot.strike.on { background: var(--red); }

    /* ===== RESULT ===== */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 22px;
      padding: 20px;
      text-align: center;
    }
    #result-screen .game-over-label {
      color: #888; font-size: 10px; letter-spacing: 3px;
    }
    #result-screen h2 {
      font-size: clamp(16px, 5vw, 28px);
      color: var(--yellow);
      text-shadow: 4px 4px 0 var(--red), 8px 8px 0 #000;
    }
    #result-detail {
      color: var(--cream);
      font-size: clamp(9px, 2.5vw, 12px);
      line-height: 2.4;
      background: #111;
      border: 2px solid #333;
      padding: 16px 24px;
    }

    /* ===== SCANLINE ===== */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 420px) {
      .sb-table { font-size: 6px; }
      .sb-table th, .sb-table td { padding: 3px 1px; min-width: 14px; }
      .sb-table .team-name { max-width: 60px; }
    }
  </style>
</head>
<body>

<!-- ========== TITLE SCREEN ========== -->
<div id="title-screen">
  <div class="logo-sub">⚾ PIXEL STADIUM ⚾</div>
  <h1>RETRO<br>BASEBALL</h1>
  <div class="subtitle">
    伝説の選手たちが集結！<br>
    9回制・完全アニメーション<br>
    野球シミュレーター
  </div>
  <button class="pixel-btn" id="start-btn">▶ GAME START</button>
  <div style="color:#444; font-size:8px; margin-top:4px;">TAP FIELD TO PITCH</div>
</div>

<!-- ========== GAME SCREEN ========== -->
<div id="game-screen">

  <!-- SCOREBOARD -->
  <div id="scoreboard">
    <div class="sb-title">★ SCORE BOARD ★</div>
    <table class="sb-table" id="score-table">
      <thead>
        <tr>
          <th class="team-name">TEAM</th>
          <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
          <th>6</th><th>7</th><th>8</th><th>9</th>
          <th class="score-total">R</th>
        </tr>
      </thead>
      <tbody id="score-body"></tbody>
    </table>
  </div>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <div class="status-item">
      <span class="status-label">INNING</span>
      <span class="status-value big" id="inning-display">1回表</span>
    </div>
    <div class="status-item">
      <span class="status-label">OUT</span>
      <div class="outs-dots">
        <div class="out-dot" id="out0"></div>
        <div class="out-dot" id="out1"></div>
      </div>
    </div>
    <div class="status-item">
      <span class="status-label">BALL</span>
      <div class="count-row">
        <div class="count-dot ball" id="b0"></div>
        <div class="count-dot ball" id="b1"></div>
        <div class="count-dot ball" id="b2"></div>
      </div>
    </div>
    <div class="status-item">
      <span class="status-label">STRIKE</span>
      <div class="count-row">
        <div class="count-dot strike" id="s0"></div>
        <div class="count-dot strike" id="s1"></div>
      </div>
    </div>
  </div>

  <!-- FIELD CANVAS -->
  <div id="field-wrap">
    <canvas id="field-canvas" width="560" height="380"></canvas>
  </div>

  <!-- BATTER INFO -->
  <div id="batter-info">
    <div>
      <div class="batter-label">NOW BATTING</div>
      <div class="batter-name" id="batter-name-display">---</div>
    </div>
    <div>
      <div class="batter-label">PITCHER</div>
      <div class="batter-name" id="pitcher-name-display">---</div>
    </div>
    <div>
      <div class="batter-stats" id="batter-stats-display"></div>
    </div>
  </div>

  <!-- COMMENTARY -->
  <div id="commentary">
    <div id="commentary-text">⚾ プレイボール！</div>
  </div>

  <!-- ACTION BUTTON -->
  <div id="action-area">
    <button class="pixel-btn green" id="pitch-btn">⚾ PITCH !</button>
  </div>

</div>

<!-- ========== RESULT SCREEN ========== -->
<div id="result-screen">
  <div class="game-over-label">GAME OVER</div>
  <h2 id="result-title">試合終了！</h2>
  <div id="result-detail"></div>
  <button class="pixel-btn" id="retry-btn">▶ NEW GAME</button>
</div>

<script src="game.js"></script>
</body>
</html>
